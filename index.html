<!DOCTYPE html>
<html>
<head>
<title>Character Studio ULTIMATE (Full Working)</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f1220;color:white}
header{padding:15px;background:#1b1f3a;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:260px;background:#15182b;padding:10px;overflow:auto}
.main{flex:1;padding:10px;overflow:auto}
.card{background:#1e2240;padding:10px;border-radius:10px;margin-bottom:10px}
button{background:#6c5ce7;color:white;border:none;padding:6px;border-radius:6px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:none}
#map{position:relative;height:400px;background:#111;border-radius:10px;overflow:hidden}
.node{position:absolute;padding:6px 10px;border-radius:10px;background:#6c5ce7;cursor:grab}
.line{position:absolute;height:2px;background:#aaa;transform-origin:left center}
</style>
</head>
<body>
<header>🚀 Character Studio ULTIMATE (Everything Working)</header>
<div class="container">

<div class="sidebar">
<h3>Sections</h3>
<div id="sections"></div>
<button onclick="addSection()">+ Add Section</button>

<h3>Settings</h3>
<label>Background</label>
<input type="color" id="bgPicker">
<label>Node Size</label>
<input type="range" id="sizePicker" min="40" max="120" value="70">
<button onclick="applySettings()">Apply Settings</button>

<h3>Timeline</h3>
<input id="time" placeholder="Time">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add Event</button>
<div id="timeline"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<div id="traitList"></div>
<button onclick="addCharacter()">Create Character</button>
</div>

<div class="card">
<h3>Characters</h3>
<div id="characters"></div>
</div>

<div class="card">
<h3>Map (Drag characters)</h3>
<div id="map"></div>
</div>

</div>
</div>

<script>
const TRAITS=["Brave","Smart","Funny","Loyal","Evil","Kind","Cold","Hot-headed","Calm","Leader","Shy","Confident","Greedy","Curious","Strategic"];

let data=JSON.parse(localStorage.getItem("ULTIMATE"))||{
sections:["Main"],current:"Main",characters:[],timeline:[]
};

let settings=JSON.parse(localStorage.getItem("SETTINGS"))||{
bg:"#0f1220",nodeSize:70
};

let tempTraits=[];

function save(){
localStorage.setItem("ULTIMATE",JSON.stringify(data));
localStorage.setItem("SETTINGS",JSON.stringify(settings));
render();
}

function applySettings(){
settings.bg=document.getElementById("bgPicker").value;
settings.nodeSize=document.getElementById("sizePicker").value;
document.body.style.background=settings.bg;
save();
}

function addSection(){
const name=prompt("Section name");
if(!name)return;
data.sections.push(name);
data.current=name;
save();
}

function addTrait(){
const val=document.getElementById("traitSelect").value;
if(val&&!tempTraits.includes(val)){
tempTraits.push(val);
renderTraits();
}
}

function renderTraits(){
const div=document.getElementById("traitList");
div.innerHTML="";
tempTraits.forEach((t,i)=>{
const span=document.createElement("span");
span.innerText=t+" ❌ ";
span.onclick=()=>{tempTraits.splice(i,1);renderTraits();};
div.appendChild(span);
});
}

function addCharacter(){
const name=document.getElementById("name").value;
const desc=document.getElementById("desc").value;
if(!name)return;

data.characters.push({
id:Date.now(),name,desc,traits:[...tempTraits],
x:100,y:100,section:data.current,links:[]
});

tempTraits=[];
save();
}

function deleteChar(id){
data.characters=data.characters.filter(c=>c.id!==id);
save();
}

function link(a,b){
const type=prompt("Relationship (friend, enemy, etc)");
a.links.push({target:b.id,type});
save();
}

function addEvent(){
const time=document.getElementById("time").value;
const event=document.getElementById("event").value;
if(!event)return;
data.timeline.push({time,event});
save();
}

function render(){

// sections
const sDiv=document.getElementById("sections");
sDiv.innerHTML="";
data.sections.forEach(s=>{
const btn=document.createElement("button");
btn.innerText=s;
btn.onclick=()=>{data.current=s;save();};
sDiv.appendChild(btn);
});

// traits
const tSel=document.getElementById("traitSelect");
tSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");

// characters
const cDiv=document.getElementById("characters");
cDiv.innerHTML="";
data.characters.filter(c=>c.section===data.current).forEach(c=>{
const div=document.createElement("div");
div.innerHTML=`<b>${c.name}</b><br>${c.desc}<br>${c.traits.join(", ")}`;

const del=document.createElement("button");
del.innerText="Delete";
del.onclick=()=>deleteChar(c.id);
div.appendChild(del);

// link buttons
 data.characters.forEach(o=>{
 if(o.id!==c.id){
 const btn=document.createElement("button");
 btn.innerText="Link → "+o.name;
 btn.onclick=()=>link(c,o);
 div.appendChild(btn);
 }
 });

cDiv.appendChild(div);
});

// timeline
const tDiv=document.getElementById("timeline");
tDiv.innerHTML="";
data.timeline.forEach(e=>{
const d=document.createElement("div");
d.innerText=e.time+": "+e.event;
tDiv.appendChild(d);
});

renderMap();
}

function renderMap(){
const map=document.getElementById("map");
map.innerHTML="";

// lines
 data.characters.forEach(c=>{
 c.links.forEach(l=>{
 const t=data.characters.find(x=>x.id===l.target);
 if(t && c.section===data.current && t.section===data.current){
 const line=document.createElement("div");
 const dx=t.x-c.x;
 const dy=t.y-c.y;
 const dist=Math.sqrt(dx*dx+dy*dy);
 const angle=Math.atan2(dy,dx)*180/Math.PI;

 line.className="line";
 line.style.width=dist+"px";
 line.style.left=c.x+"px";
 line.style.top=c.y+"px";
 line.style.transform=`rotate(${angle}deg)`;
 map.appendChild(line);
 }
 });
 });

// nodes
 data.characters.filter(c=>c.section===data.current).forEach(c=>{
 const node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";
 node.style.width=settings.nodeSize+"px";

 node.onmousedown=(e)=>{
 const offsetX=e.offsetX;
 const offsetY=e.offsetY;

 function move(ev){
 c.x=ev.pageX-map.offsetLeft-offsetX;
 c.y=ev.pageY-map.offsetTop-offsetY;
 renderMap();
 }

 function up(){document.removeEventListener("mousemove",move);}

 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",up,{once:true});
 };

 map.appendChild(node);
 });
}

render();
</script>

</body>
</html>
