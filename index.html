<!DOCTYPE html>
<html>
<head>
<title>Character Studio PRO</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f1220;color:#fff}
header{padding:15px;background:#1b1f3a;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:250px;background:#15182b;padding:10px;overflow:auto}
.main{flex:1;padding:15px;overflow:auto}
.card{background:#1e2240;padding:12px;border-radius:12px;margin-bottom:12px}
button{background:#6c5ce7;color:#fff;border:none;padding:8px;border-radius:8px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none}
.node{position:absolute;padding:6px 10px;border-radius:10px;background:#6c5ce7;color:#fff;cursor:grab}
#map{position:relative;height:400px;background:#111;border-radius:10px;overflow:hidden}
.line{position:absolute;height:2px;background:#aaa;transform-origin:left center}
</style>
</head>
<body>
<header>🧠 Character Studio PRO (WORKING VERSION)</header>
<div class="container">

<div class="sidebar">
<h3>Sections</h3>
<div id="sections"></div>
<button onclick="addSection()">+ Section</button>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<div id="traitList"></div>
<button onclick="addCharacter()">Add Character</button>
</div>

<div class="card">
<h3>Characters</h3>
<div id="characters"></div>
</div>

<div class="card">
<h3>Map (Drag nodes)</h3>
<div id="map"></div>
</div>

</div>
</div>

<script>
const TRAITS=["Brave","Smart","Funny","Loyal","Evil","Kind","Cold","Hot-headed","Calm","Leader","Shy","Confident"];

let data=JSON.parse(localStorage.getItem("pro"))||{
sections:["Main"],current:"Main",characters:[]
};

let tempTraits=[];

function save(){localStorage.setItem("pro",JSON.stringify(data));render();}

function addSection(){
const name=prompt("Section name");
if(!name)return;
data.sections.push(name);
data.current=name;
save();
}

function addTrait(){
const val=document.getElementById("traitSelect").value;
if(val&&!tempTraits.includes(val)){
tempTraits.push(val);
renderTraits();
}
}

function renderTraits(){
const div=document.getElementById("traitList");
div.innerHTML="";
tempTraits.forEach((t,i)=>{
const span=document.createElement("span");
span.innerText=t+" ✖";
span.onclick=()=>{tempTraits.splice(i,1);renderTraits();};
div.appendChild(span);
});
}

function addCharacter(){
const name=document.getElementById("name").value;
const desc=document.getElementById("desc").value;
if(!name)return;

data.characters.push({
id:Date.now(),name,desc,traits:[...tempTraits],x:50,y:50,links:[]
});

tempTraits=[];
save();
}

function deleteChar(id){
data.characters=data.characters.filter(c=>c.id!==id);
save();
}

function link(a,b){
const type=prompt("Relationship");
a.links.push({target:b.id,type});
save();
}

function render(){

// sections
const sDiv=document.getElementById("sections");
sDiv.innerHTML="";
data.sections.forEach(s=>{
const btn=document.createElement("button");
btn.innerText=s;
btn.onclick=()=>{data.current=s;save();};
sDiv.appendChild(btn);
});

// traits dropdown
const tSel=document.getElementById("traitSelect");
tSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");

// characters list
const cDiv=document.getElementById("characters");
cDiv.innerHTML="";
data.characters.forEach(c=>{
const div=document.createElement("div");
div.innerHTML=`<b>${c.name}</b> (${c.traits.join(", ")})`;

const del=document.createElement("button");
del.innerText="Delete";
del.onclick=()=>deleteChar(c.id);
div.appendChild(del);

// linking buttons
 data.characters.forEach(o=>{
 if(o.id!==c.id){
 const btn=document.createElement("button");
 btn.innerText="Link to "+o.name;
 btn.onclick=()=>link(c,o);
 div.appendChild(btn);
 }
 });

cDiv.appendChild(div);
});

renderMap();
}

function renderMap(){
const map=document.getElementById("map");
map.innerHTML="";

// lines
 data.characters.forEach(c=>{
 c.links.forEach(l=>{
 const target=data.characters.find(x=>x.id===l.target);
 if(target){
 const line=document.createElement("div");
 const dx=target.x-c.x;
 const dy=target.y-c.y;
 const dist=Math.sqrt(dx*dx+dy*dy);
 const angle=Math.atan2(dy,dx)*180/Math.PI;

 line.className="line";
 line.style.width=dist+"px";
 line.style.left=c.x+"px";
 line.style.top=c.y+"px";
 line.style.transform=`rotate(${angle}deg)`;
 map.appendChild(line);
 }
 });
 });

// nodes
 data.characters.forEach(c=>{
 const node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";

 node.onmousedown=(e)=>{
 const offsetX=e.offsetX;
 const offsetY=e.offsetY;

 function move(ev){
 c.x=ev.pageX-map.offsetLeft-offsetX;
 c.y=ev.pageY-map.offsetTop-offsetY;
 renderMap();
 }

 function up(){document.removeEventListener("mousemove",move);}

 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",up,{once:true});
 };

 map.appendChild(node);
 });
}

render();
</script>

</body>
</html>
