<!DOCTYPE html>
<html>
<head>
<title>Character Studio</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
header{padding:10px;border-bottom:1px solid #444}

.container{display:flex;height:calc(100vh - 50px)}

.sidebar{width:250px;border-right:1px solid #444;padding:10px}
.main{flex:1;padding:10px;overflow:auto}

.card{border:1px solid #444;padding:10px;margin-bottom:10px;border-radius:10px}

input,select,textarea{width:100%;margin:5px 0;padding:5px}

#mapWrap{
height:500px;
overflow:auto;
border:1px solid #444;
}

#map{
width:3000px;
height:5000px;
position:relative;
background:#1a1a1a;
}

.node{
position:absolute;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
color:#fff;
user-select:none;
}

.line{
position:absolute;
height:3px;
transform-origin:left;
z-index:10;
}

.label{
position:absolute;
font-size:12px;
z-index:11;
}

.panel{
position:fixed;
right:10px;
top:80px;
width:250px;
background:#222;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>Character Studio</header>

<div class="container">

<div class="sidebar">
<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">
<input type="range" id="size" min="40" max="120" value="70">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="addCustomTrait()">Custom Trait</button>

<div id="traitList"></div>

<button onclick="createChar()">Create</button>
</div>

<div class="card">
<button onclick="openRel()">Add Relationship</button>
</div>

<div id="mapWrap">
<div id="map"></div>
</div>

</div>
</div>

<!-- INFO PANEL -->
<div id="info" class="panel" style="display:none"></div>

<!-- EDIT PANEL -->
<div id="edit" class="panel" style="display:none">
<h3>Edit Character</h3>

<input id="eName">
<textarea id="eDesc"></textarea>
<input type="color" id="eColor">
<input type="range" id="eSize">

<select id="eTraitSel"></select>
<button onclick="addEditTrait()">Add Trait</button>

<div id="eTraits"></div>

<button onclick="saveEdit()">Save</button>
<button onclick="closeEdit()">Close</button>
</div>

<!-- REL PANEL -->
<div id="rel" class="panel" style="display:none">
<h3>Relationship</h3>

<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<input type="color" id="rColor">

<button onclick="createRel()">Create</button>
<button onclick="closeRel()">Cancel</button>
</div>

<script>

let TRAITS=["Brave","Calm","Smart","Funny"].sort();
let REL=["Friend","Enemy","Sibling","Rival"];

let data={chars:[],rels:[]};
let tempTraits=[];
let editId=null;

// TRAITS
function addTrait(){
let t=traitSel.value;
if(!tempTraits.includes(t)) tempTraits.push(t);
renderTraits();
}

function addCustomTrait(){
let t=prompt("Trait:");
if(!t)return;
TRAITS.push(t);
TRAITS=[...new Set(TRAITS)].sort();
render();
}

function renderTraits(){
traitList.innerHTML=tempTraits.map((t,i)=>
`${t} <button onclick="tempTraits.splice(${i},1);renderTraits()">❌</button>`
).join("<br>");
}

// CREATE CHARACTER
function createChar(){
let n=name.value.trim();
if(!n)return alert("Enter name");

data.chars.push({
id:Date.now(),
name:n,
desc:desc.value,
color:color.value,
size:+size.value,
traits:[...tempTraits],
x:200,y:200
});

name.value="";
desc.value="";
tempTraits=[];
render();
}

// INFO VIEW
function showInfo(c){
info.style.display="block";
info.innerHTML=`
<h3>${c.name}</h3>
<p>${c.desc}</p>
<p><b>Traits:</b> ${c.traits.join(", ")}</p>
<button onclick="openEdit(${c.id})">Edit</button>
`;
}

// EDIT FIXED
function openEdit(id){
let c=data.chars.find(x=>x.id===id);
editId=id;

eName.value=c.name;
eDesc.value=c.desc;
eColor.value=c.color;
eSize.value=c.size;

renderEditTraits(c);

edit.style.display="block";
}

function renderEditTraits(c){
eTraits.innerHTML=c.traits.map((t,i)=>
`${t} <button onclick="removeEditTrait(${i})">❌</button>`
).join("<br>");
}

function removeEditTrait(i){
let c=data.chars.find(x=>x.id===editId);
c.traits.splice(i,1);
renderEditTraits(c);
}

function addEditTrait(){
let t=eTraitSel.value;
let c=data.chars.find(x=>x.id===editId);
if(!c.traits.includes(t)) c.traits.push(t);
renderEditTraits(c);
}

function saveEdit(){
let c=data.chars.find(x=>x.id===editId);

c.name=eName.value;
c.desc=eDesc.value;
c.color=eColor.value;
c.size=+eSize.value;

closeEdit();
render();
}

function closeEdit(){edit.style.display="none";}

// RELATIONSHIPS FIXED
function openRel(){
rel.style.display="block";

let opts=data.chars.map(c=>`<option value=${c.id}>${c.name}</option>`).join("");

rA.innerHTML=opts;
rB.innerHTML=opts;
rType.innerHTML=REL.map(r=>`<option>${r}</option>`).join("");
}

function closeRel(){rel.style.display="none";}

function createRel(){
data.rels.push({
a:+rA.value,
b:+rB.value,
type:rType.value,
color:rColor.value
});
closeRel();
render();
}

// RENDER
function render(){

traitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");
eTraitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");

charList.innerHTML=data.chars.map(c=>
`<div onclick="showInfo(${c.id})">${c.name}</div>`
).join("");

renderMap();
}

// MAP
function renderMap(){
map.innerHTML="";

// RELATIONS
data.rels.forEach((r,i)=>{
let a=data.chars.find(c=>c.id===r.a);
let b=data.chars.find(c=>c.id===r.b);
if(!a||!b)return;

let ax=a.x+a.size/2;
let ay=a.y+a.size/2;
let bx=b.x+b.size/2;
let by=b.y+b.size/2;

let dx=bx-ax,dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

line.onclick=()=>{
data.rels.splice(i,1);
render();
};

let label=document.createElement("div");
label.className="label";
label.innerText=r.type;
label.style.left=(ax+bx)/2+"px";
label.style.top=(ay+by)/2+"px";

map.appendChild(line);
map.appendChild(label);
});

// CHARACTERS
data.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;

node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.width=c.size+"px";
node.style.height=c.size+"px";
node.style.background=c.color;

// drag
node.onmousedown=e=>{
let ox=e.offsetX,oy=e.offsetY;

function move(ev){
c.x=ev.pageX-map.offsetLeft-ox;
c.y=ev.pageY-map.offsetTop-oy;
renderMap();
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

map.appendChild(node);
});
}

// INIT
render();

</script>

</body>
</html>
