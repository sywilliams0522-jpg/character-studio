<!DOCTYPE html>
<html>
<head>
<title>Character Studio PRO+ FINAL</title>
<style>
body{margin:0;font-family:Segoe UI}
.dark{background:#000;color:#fff}
.light{background:#fff;color:#000}
header{padding:15px;background:#1b1f3a;color:white;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:260px;background:#15182b;padding:10px;overflow:auto;color:white}
.main{flex:1;padding:10px;overflow:auto}
.card{background:#1e2240;padding:10px;border-radius:10px;margin-bottom:10px;color:white}
button{background:#6c5ce7;color:white;border:none;padding:6px;border-radius:6px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:none}
#map{position:relative;height:500px;border-radius:10px;overflow:hidden}
.node{position:absolute;padding:6px;border-radius:10px;cursor:grab;user-select:none;text-align:center}
.line{position:absolute;height:3px;transform-origin:left center}
.label{position:absolute;font-size:12px}
</style>
</head>
<body class="dark">
<header>🚀 Character Studio PRO+ FINAL</header>
<div class="container">

<div class="sidebar">
<h3>Mode</h3>
<button onclick="toggleMode()">Toggle Dark / Light</button>

<h3>Map Color</h3>
<input type="color" id="mapColor" value="#111">
<button onclick="applyMapColor()">Apply</button>

<h3>Character Size</h3>
<input type="range" id="size" min="30" max="150" value="80">
<button onclick="applySettings()">Apply</button>

<h3>All Characters</h3>
<div id="characterList"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="charColor" value="#6c5ce7">

<input id="traitSearch" placeholder="Search trait..." oninput="filterTraits()">
<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="addCustomTrait()">+ Custom Trait</button>

<div id="traitList"></div>
<button onclick="addCharacter()">Create</button>
</div>

<div class="card">
<h3>Map</h3>
<button onclick="startConnectionMode()">Add Connection</button>
<div id="map"></div>
</div>

</div>
</div>

<script>
let TRAITS=["Aggressive","Brave","Calm","Caring","Charming","Cold","Confident","Creative","Curious","Determined","Evil","Fearless","Funny","Greedy","Honest","Impulsive","Jealous","Kind","Lazy","Leader","Loyal","Manipulative","Optimistic","Patient","Pessimistic","Reckless","Sarcastic","Selfish","Selfless","Shy","Smart","Strategic","Stubborn","Wise"].sort();

let RELATIONSHIPS=["Friend","Best Friend","Enemy","Rival","Sibling","Brother","Sister","Married","Dating","Parent","Child","Mentor","Student","Boss","Employee"];

let data=JSON.parse(localStorage.getItem("PROPLUS"))||{
characters:[],connections:[]
};

let settings={size:80,mapColor:"#111"};
let tempTraits=[];
let connectionMode=false;
let selectedChar=null;
let dragging=false;

function save(){localStorage.setItem("PROPLUS",JSON.stringify(data));render();}

function toggleMode(){
if(document.body.classList.contains("dark")){
document.body.classList.replace("dark","light");
}else{
document.body.classList.replace("light","dark");
}
}

function applySettings(){
settings.size=parseInt(document.getElementById("size").value);
render();
}

function applyMapColor(){
settings.mapColor=document.getElementById("mapColor").value;
document.getElementById("map").style.background=settings.mapColor;
}

function filterTraits(){
const val=document.getElementById("traitSearch").value.toLowerCase();
const tSel=document.getElementById("traitSelect");
tSel.innerHTML=TRAITS.filter(t=>t.toLowerCase().includes(val)).map(t=>`<option>${t}</option>`).join("");
}

function addCustomTrait(){
const t=prompt("Custom trait");
if(t){TRAITS.push(t);TRAITS.sort();filterTraits();}
}

function addTrait(){
const val=document.getElementById("traitSelect").value;
if(val&&!tempTraits.includes(val)){
tempTraits.push(val);
renderTraits();
}
}

function renderTraits(){
const div=document.getElementById("traitList");
div.innerHTML="";
tempTraits.forEach((t,i)=>{
const span=document.createElement("span");
span.innerText=t+" ❌ ";
span.onclick=()=>{tempTraits.splice(i,1);renderTraits();};
div.appendChild(span);
});
}

function addCharacter(){
const name=document.getElementById("name").value;
const desc=document.getElementById("desc").value;
const color=document.getElementById("charColor").value;
if(!name)return;

data.characters.push({id:Date.now(),name,desc,color,traits:[...tempTraits],x:150,y:150});

tempTraits=[];
renderTraits();
save();
}

function startConnectionMode(){
connectionMode=true;
selectedChar=null;
alert("Click 2 characters");
}

function render(){
filterTraits();

// character list
const list=document.getElementById("characterList");
list.innerHTML="";
data.characters.forEach(c=>{
const div=document.createElement("div");
div.innerText=c.name;
list.appendChild(div);
});

renderMap();
}

function renderMap(){
const map=document.getElementById("map");
map.innerHTML="";
map.style.background=settings.mapColor;

// connections
 data.connections.forEach(con=>{
 const a=data.characters.find(x=>x.id===con.a);
 const b=data.characters.find(x=>x.id===con.b);
 if(a&&b){
 const ax=a.x+settings.size/2;
 const ay=a.y+settings.size/2;
 const bx=b.x+settings.size/2;
 const by=b.y+settings.size/2;

 const dx=bx-ax;
 const dy=by-ay;
 const dist=Math.sqrt(dx*dx+dy*dy);
 const angle=Math.atan2(dy,dx)*180/Math.PI;

 const line=document.createElement("div");
 line.className="line";
 line.style.background=con.color;
 line.style.width=dist+"px";
 line.style.left=ax+"px";
 line.style.top=ay+"px";
 line.style.transform=`rotate(${angle}deg)`;

 line.onclick=()=>{
 alert(`${a.name}: ${a.desc}\nTraits: ${a.traits.join(", ")}\n\n${b.name}: ${b.desc}\nTraits: ${b.traits.join(", ")}`);
 };

 const label=document.createElement("div");
 label.className="label";
 label.innerText=con.type;
 label.style.left=(ax+bx)/2+"px";
 label.style.top=(ay+by)/2+"px";

 map.appendChild(line);
 map.appendChild(label);
 }
 });

// nodes
 data.characters.forEach(c=>{
 const node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";
 node.style.background=c.color;
 node.style.width=settings.size+"px";
 node.style.height=settings.size+"px";
 node.style.lineHeight=settings.size+"px";

 node.onmousedown=(e)=>{
 dragging=true;

 function move(ev){
 c.x=ev.pageX-map.offsetLeft-settings.size/2;
 c.y=ev.pageY-map.offsetTop-settings.size/2;
 renderMap();
 }

 function up(){dragging=false;document.removeEventListener("mousemove",move);} 

 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",up,{once:true});
 };

 node.onclick=()=>{
 if(dragging)return;
 alert(`${c.name}\n\n${c.desc}\n\nTraits: ${c.traits.join(", ")}`);

 if(connectionMode){
 if(!selectedChar){selectedChar=c;}
 else{
 const type=prompt("Relationship type or custom")||"Unknown";
 const color=prompt("Line color")||"red";
 data.connections.push({a:selectedChar.id,b:c.id,type,color});
 connectionMode=false;
 selectedChar=null;
 save();
 }
 }
 };

 map.appendChild(node);
 });
}

render();
</script>

</body>
</html>
