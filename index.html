<!DOCTYPE html>
<html>
<head>
<title>Character Studio</title>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:#fff}
header{padding:10px;border-bottom:1px solid #444}

.container{display:flex;height:calc(100vh - 50px)}

.sidebar{width:250px;border-right:1px solid #444;padding:10px}
.main{flex:1;padding:10px;overflow:auto}

.card{border:1px solid #444;padding:10px;margin-bottom:10px;border-radius:10px}

input,select,textarea{width:100%;margin:5px 0;padding:5px}

#mapWrap{
height:500px;
overflow:auto;
border:1px solid #444;
}

#map{
width:3000px;
height:5000px; /* VERY TALL */
position:relative;
background:#1a1a1a;
}

.node{
position:absolute;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
color:#fff;
user-select:none;
}

.line{
position:absolute;
height:3px;
transform-origin:left;
background:red;
z-index:10;
}
</style>
</head>

<body>

<header>Character Studio</header>

<div class="container">

<div class="sidebar">
<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">
<input type="range" id="size" min="40" max="120" value="70">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="addCustomTrait()">Custom Trait</button>

<div id="traitList"></div>

<button onclick="createChar()">CREATE</button>
</div>

<div class="card">
<h3>Timeline</h3>
<input id="year" placeholder="Year">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add</button>
<div id="timeline"></div>
</div>

<div class="card">
<button onclick="createRel()">Quick Relationship (first 2 chars)</button>
</div>

<div id="mapWrap">
<div id="map"></div>
</div>

</div>
</div>

<script>

let TRAITS=["Brave","Calm","Smart","Funny"];
let tempTraits=[];

let data={
chars:[],
rels:[],
timeline:[]
};

// TRAITS
function addTrait(){
let t=document.getElementById("traitSel").value;
if(!tempTraits.includes(t)) tempTraits.push(t);
renderTraits();
}

function addCustomTrait(){
let t=prompt("Trait:");
if(!t)return;
TRAITS.push(t);
TRAITS=[...new Set(TRAITS)].sort();
render();
}

function renderTraits(){
traitList.innerHTML=tempTraits.map((t,i)=>
t+" <button onclick='removeTrait("+i+")'>x</button>"
).join("<br>");
}

function removeTrait(i){
tempTraits.splice(i,1);
renderTraits();
}

// CREATE CHARACTER (FIXED)
function createChar(){
let n=document.getElementById("name").value.trim();
if(n===""){alert("Type a name");return;}

let c={
id:Date.now(),
name:n,
desc:document.getElementById("desc").value,
color:document.getElementById("color").value,
size:parseInt(document.getElementById("size").value),
traits:[...tempTraits],
x:200,
y:200
};

data.chars.push(c);

// reset
document.getElementById("name").value="";
document.getElementById("desc").value="";
tempTraits=[];
renderTraits();

render();
}

// TIMELINE (FIXED)
function addEvent(){
let e=document.getElementById("event").value;
if(e==="")return;

data.timeline.push({
year:parseInt(document.getElementById("year").value)||0,
text:e
});

render();
}

// RELATIONSHIP (simple but working)
function createRel(){
if(data.chars.length<2)return alert("Need 2 chars");

data.rels.push({
a:data.chars[0].id,
b:data.chars[1].id
});

render();
}

// RENDER
function render(){

// traits dropdown
traitSel.innerHTML=TRAITS.sort().map(t=>`<option>${t}</option>`).join("");

// char list
charList.innerHTML=data.chars.map(c=>c.name).join("<br>");

// timeline
timeline.innerHTML=data.timeline
.sort((a,b)=>a.year-b.year)
.map((e,i)=>`${e.year} - ${e.text} <button onclick='delEvent(${i})'>x</button>`)
.join("<br>");

renderMap();
}

function delEvent(i){
data.timeline.splice(i,1);
render();
}

// MAP
function renderMap(){
map.innerHTML="";

// lines
data.rels.forEach(r=>{
let a=data.chars.find(c=>c.id===r.a);
let b=data.chars.find(c=>c.id===r.b);
if(!a||!b)return;

let ax=a.x+a.size/2;
let ay=a.y+a.size/2;
let bx=b.x+b.size/2;
let by=b.y+b.size/2;

let dx=bx-ax,dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

map.appendChild(line);
});

// nodes
data.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;

node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.width=c.size+"px";
node.style.height=c.size+"px";
node.style.background=c.color;

// drag
node.onmousedown=e=>{
let ox=e.offsetX,oy=e.offsetY;

function move(ev){
c.x=ev.pageX-map.offsetLeft-ox;
c.y=ev.pageY-map.offsetTop-oy;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

map.appendChild(node);
});
}

// INIT
render();

</script>

</body>
</html>
