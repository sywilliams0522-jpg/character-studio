<!DOCTYPE html>
<html>
<head>
<title>📚 Character Studio</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0d0d0d;color:white}
header{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #444}

.container{display:flex;height:calc(100vh - 50px)}
.sidebar{width:260px;border-right:1px solid #444;padding:10px;overflow:auto}
.main{flex:1;padding:10px;overflow:auto}

.card{border:1px solid #444;border-radius:10px;padding:10px;margin-bottom:10px}

button{background:#2d2d2d;color:white;border:none;padding:6px;border-radius:6px;cursor:pointer}
button:hover{background:#444}

input,select,textarea{
width:100%;margin:5px 0;padding:5px;border-radius:6px;
border:1px solid #444;background:#111;color:white
}

#map{height:400px;border:1px solid #444;position:relative;border-radius:10px}
.node{position:absolute;border-radius:8px;text-align:center;cursor:grab;color:white;font-size:12px}
.line{position:absolute;height:3px;transform-origin:left center}

.timeline{display:flex;gap:10px;overflow-x:auto}
.event{border:1px solid #555;padding:8px;border-radius:8px;min-width:120px}

.modal{position:fixed;top:25%;left:35%;background:#222;padding:15px;border-radius:10px}
</style>
</head>

<body>

<header>
<div>📚 Character Studio</div>
</header>

<div class="container">

<div class="sidebar">

<h3>📂 Folder</h3>
<select id="folderSel"></select>
<input id="newFolder" placeholder="New folder">
<button onclick="addFolder()">➕</button>

<h3>📁 Project</h3>
<select id="projectSel"></select>
<input id="newProject" placeholder="New project">
<button onclick="addProject()">➕</button>

<h3>👥 Characters</h3>
<div id="charList"></div>

</div>

<div class="main">

<div class="card">
<h3>➕ Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>

<div id="traitList"></div>
<button onclick="createChar()">Create</button>
</div>

<div class="card">
<h3>🕒 Timeline</h3>
<input id="time" placeholder="Year">
<input id="eventInput" placeholder="Event">
<button onclick="addEvent()">Add</button>
<div id="timeline" class="timeline"></div>
</div>

<div class="card">
<button onclick="openRel()">🧵 Add Relationship</button>
</div>

<div class="card">
<div id="map"></div>
</div>

</div>
</div>

<div id="editModal" class="modal" style="display:none">
<input id="editName">
<textarea id="editDesc"></textarea>
<div id="editTraits"></div>
<button onclick="saveEdit()">Save</button>
</div>

<div id="relUI" class="modal" style="display:none">
<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<input type="color" id="rColor">
<button onclick="createRel()">Create</button>
</div>

<script>

let TRAITS=[
"Aggressive","Brave","Calm","Charming","Cold","Confident","Creative","Curious",
"Funny","Honest","Impulsive","Jealous","Kind","Lazy","Leader","Loyal",
"Manipulative","Patient","Reckless","Selfish","Smart","Strategic"
].sort();

let REL=["Friend","Enemy","Sibling","Married","Rival","Mentor"];

let data={folders:{}};
let currentFolder=null,currentProject=null;
let tempTraits=[];
let editId=null;

function getP(){
return data.folders[currentFolder]?.projects[currentProject];
}

function addFolder(){
let n=newFolder.value.trim();
if(!n)return;
data.folders[n]={projects:{}};
currentFolder=n;
render();
}

function addProject(){
if(!currentFolder)return;
let n=newProject.value.trim();
if(!n)return;
data.folders[currentFolder].projects[n]={chars:[],rels:[],timeline:[]};
currentProject=n;
render();
}

folderSel.onchange=()=>{currentFolder=folderSel.value;render();}
projectSel.onchange=()=>{currentProject=projectSel.value;render();}

function addTrait(){
let t=traitSel.value;
if(!tempTraits.includes(t))tempTraits.push(t);
traitList.innerText=tempTraits.join(", ");
}

function createChar(){
let p=getP();
if(!p)return alert("Select project first");

let n=name.value.trim();
if(!n)return alert("Enter name");

p.chars.push({
id:Date.now(),
name:n,
desc:desc.value,
color:color.value,
traits:[...tempTraits],
x:150,y:150
});

tempTraits=[];
name.value="";desc.value="";
render();
}

function openEdit(id){
let p=getP();
let c=p.chars.find(x=>x.id===id);
editId=id;

editName.value=c.name;
editDesc.value=c.desc;

editTraits.innerHTML=c.traits.map((t,i)=>
`${t} <button onclick="removeTrait(${i})">❌</button>`
).join("<br>");

editModal.style.display="block";
}

function removeTrait(i){
let p=getP();
let c=p.chars.find(x=>x.id===editId);
c.traits.splice(i,1);
openEdit(editId);
}

function saveEdit(){
let p=getP();
let c=p.chars.find(x=>x.id===editId);

c.name=editName.value;
c.desc=editDesc.value;

editModal.style.display="none";
render();
}

function addEvent(){
let p=getP(); if(!p)return;

let t=parseInt(time.value);
let e=eventInput.value.trim();

if(!e)return;

p.timeline.push({t:isNaN(t)?0:t,e});
render();
}

function deleteEvent(i){
getP().timeline.splice(i,1);
render();
}

function openRel(){
let p=getP(); if(!p)return;

relUI.style.display="block";
rA.innerHTML=p.chars.map(c=>`<option value=${c.id}>${c.name}</option>`);
rB.innerHTML=rA.innerHTML;
rType.innerHTML=REL.map(r=>`<option>${r}</option>`);
}

function createRel(){
let p=getP();
p.rels.push({a:+rA.value,b:+rB.value,type:rType.value,color:rColor.value});
relUI.style.display="none";
render();
}

function render(){

folderSel.innerHTML=Object.keys(data.folders).map(f=>`<option>${f}</option>`);
if(currentFolder){
projectSel.innerHTML=Object.keys(data.folders[currentFolder].projects)
.map(p=>`<option>${p}</option>`);
}

traitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`);

let p=getP();
if(!p)return;

charList.innerHTML=p.chars.map(c=>
`<div>${c.name} <button onclick="openEdit(${c.id})">✏️</button></div>`
).join("");

timeline.innerHTML=p.timeline
.sort((a,b)=>a.t-b.t)
.map((e,i)=>
`<div class="event">${e.t}<br>${e.e}
<button onclick="deleteEvent(${i})">❌</button></div>`
).join("");

renderMap();
}

function renderMap(){
let p=getP(); if(!p)return;
map.innerHTML="";

p.rels.forEach((r,i)=>{
let a=p.chars.find(c=>c.id===r.a);
let b=p.chars.find(c=>c.id===r.b);
if(!a||!b)return;

let ax=a.x+35, ay=a.y+35;
let bx=b.x+35, by=b.y+35;

let dx=bx-ax, dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

line.onclick=()=>{p.rels.splice(i,1);render();};
map.appendChild(line);
});

p.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.background=c.color;
node.style.width="70px";
node.style.height="70px";
node.style.lineHeight="70px";

node.onmousedown=e=>{
let ox=e.offsetX, oy=e.offsetY;

function move(ev){
c.x=ev.pageX-map.offsetLeft-ox;
c.y=ev.pageY-map.offsetTop-oy;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

map.appendChild(node);
});
}

render();

</script>
</body>
</html>
