<!DOCTYPE html>
<html>
<head>
<title>Character Studio APP</title>

<style>
body{margin:0;font-family:Segoe UI}
.dark{background:#0d0d0d;color:#fff}
.light{background:#f5f5f5;color:#000}

header{
display:flex;justify-content:space-between;
padding:10px 15px;border-bottom:1px solid #444
}

.container{display:flex;height:calc(100vh - 50px)}

.sidebar{
width:260px;border-right:1px solid #444;
padding:10px;overflow:auto
}

.main{flex:1;padding:10px;overflow:auto}

.card{
border:1px solid #444;
border-radius:10px;
padding:10px;
margin-bottom:10px
}

button{
background:#2d2d2d;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer
}

button:hover{background:#444}

input,select,textarea{
width:100%;
padding:6px;
margin:5px 0;
border-radius:6px;
border:1px solid #444;
background:#111;color:white
}

.light input,.light select,.light textarea{
background:white;color:black
}

#map{
height:400px;
border:1px solid #444;
position:relative;
overflow:hidden;
border-radius:10px
}

.node{
position:absolute;
border-radius:8px;
text-align:center;
cursor:grab;
color:white;
font-size:12px
}

.line{
position:absolute;
height:3px;
transform-origin:left center
}

.timeline{
display:flex;
gap:10px;
overflow-x:auto
}

.event{
padding:8px;
border:1px solid #555;
border-radius:8px;
min-width:120px
}

.icon{margin-right:5px}
</style>
</head>

<body class="dark">

<header>
<div>📚 Character Studio</div>
<button onclick="toggleMode()">🌙 Toggle</button>
</header>

<div class="container">

<div class="sidebar">

<h3>📂 Folder</h3>
<select id="folderSel" onchange="selectFolder()"></select>
<input id="newFolder" placeholder="New folder">
<button onclick="addFolder()">➕ Add</button>

<h3>📁 Project</h3>
<select id="projectSel" onchange="selectProject()"></select>
<input id="newProject" placeholder="New project">
<button onclick="addProject()">➕ Add</button>

<h3>👥 Characters</h3>
<div id="charList"></div>

</div>

<div class="main">

<div class="card">
<h3>➕ Create Character</h3>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="addCustomTrait()">+ Custom</button>

<div id="traitList"></div>

<button onclick="createChar()">Create</button>
</div>

<div class="card">
<h3>🕒 Timeline</h3>

<input id="time" placeholder="Time">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add</button>

<div id="timeline" class="timeline"></div>
</div>

<div class="card">
<h3>🧵 Relationships</h3>
<button onclick="openRel()">Add Relationship</button>
</div>

<div class="card">
<h3>🗺 Map</h3>
<div id="map"></div>
</div>

</div>
</div>

<div id="relUI" style="display:none;position:fixed;top:25%;left:35%;background:#222;padding:15px;border-radius:10px">
<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<input type="color" id="rColor">
<button onclick="createRel()">Create</button>
</div>

<script>

let TRAITS=["Brave","Smart","Funny","Loyal","Kind","Cold","Angry","Calm","Leader","Shy","Confident","Lazy","Creative","Curious","Honest","Jealous","Manipulative","Charming","Strategic","Impulsive","Patient","Reckless"].sort();

let REL=["Friend","Enemy","Sibling","Married","Rival","Mentor"];

let data=JSON.parse(localStorage.getItem("APP2"))||{folders:{}};
let currentFolder=null,currentProject=null;
let tempTraits=[];
let size=70;

function save(){localStorage.setItem("APP2",JSON.stringify(data));render();}

function toggleMode(){
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
}

function addFolder(){
let name=newFolder.value;
if(!name)return;
data.folders[name]={projects:{}};
currentFolder=name;
save();
}

function addProject(){
if(!currentFolder)return;
let name=newProject.value;
data.folders[currentFolder].projects[name]={chars:[],rels:[],timeline:[]};
currentProject=name;
save();
}

function selectFolder(){
currentFolder=folderSel.value;
currentProject=null;
render();
}

function selectProject(){
currentProject=projectSel.value;
render();
}

function getP(){
if(!currentFolder||!currentProject)return null;
return data.folders[currentFolder].projects[currentProject];
}

function addTrait(){
let t=traitSel.value;
if(!tempTraits.includes(t))tempTraits.push(t);
renderTraits();
}

function addCustomTrait(){
let t=prompt("Trait");
if(t){TRAITS.push(t);TRAITS.sort();render();}
}

function renderTraits(){
traitList.innerHTML=tempTraits.map((t,i)=>`${t} ❌`).join("<br>");
}

function createChar(){
let p=getP(); if(!p)return alert("Select project first");
p.chars.push({id:Date.now(),name:name.value,desc:desc.value,color:color.value,traits:[...tempTraits],x:100,y:100});
tempTraits=[];
save();
}

function deleteChar(id){
let p=getP();
p.chars=p.chars.filter(c=>c.id!==id);
p.rels=p.rels.filter(r=>r.a!==id&&r.b!==id);
save();
}

function addEvent(){
let p=getP(); if(!p)return;
p.timeline.push({t:time.value,e:event.value});
save();
}

function deleteEvent(i){
getP().timeline.splice(i,1);
save();
}

function openRel(){
let p=getP(); if(!p)return;

relUI.style.display="block";

rA.innerHTML=p.chars.map(c=>`<option value=${c.id}>${c.name}</option>`);
rB.innerHTML=rA.innerHTML;
rType.innerHTML=REL.map(r=>`<option>${r}</option>`);
}

function createRel(){
let p=getP();
p.rels.push({a:+rA.value,b:+rB.value,type:rType.value,color:rColor.value});
relUI.style.display="none";
save();
}

function render(){

folderSel.innerHTML=Object.keys(data.folders).map(f=>`<option>${f}</option>`);

if(currentFolder){
projectSel.innerHTML=Object.keys(data.folders[currentFolder].projects).map(p=>`<option>${p}</option>`);
}

traitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`);

let p=getP();
if(!p)return;

charList.innerHTML=p.chars.map(c=>`
<div>${c.name}
<button onclick="deleteChar(${c.id})">❌</button>
</div>`).join("");

timeline.innerHTML=p.timeline.map((e,i)=>`
<div class="event">${e.t}<br>${e.e}
<button onclick="deleteEvent(${i})">❌</button>
</div>`).join("");

renderMap();
}

function renderMap(){
let p=getP(); if(!p)return;
map.innerHTML="";

p.rels.forEach((r,i)=>{
let a=p.chars.find(c=>c.id===r.a);
let b=p.chars.find(c=>c.id===r.b);

let ax=a.x+size/2, ay=a.y+size/2;
let bx=b.x+size/2, by=b.y+size/2;

let dx=bx-ax, dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

line.onclick=()=>{p.rels.splice(i,1);save();};

map.appendChild(line);
});

p.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.background=c.color;
node.style.width=size+"px";
node.style.height=size+"px";
node.style.lineHeight=size+"px";

node.onmousedown=e=>{
function move(ev){
c.x=ev.pageX-map.offsetLeft-size/2;
c.y=ev.pageY-map.offsetTop-size/2;
renderMap();
}
document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

node.onclick=()=>alert(`${c.name}\n${c.desc}\nTraits: ${c.traits.join(", ")}`);

map.appendChild(node);
});
}

render();

</script>
</body>
</html>
