<!DOCTYPE html>
<html>
<head>
<title>Character Studio PRO APP</title>

<style>
body{margin:0;font-family:Segoe UI}
.dark{background:#000;color:#fff}
.light{background:#fff;color:#000}

header{padding:10px;font-size:18px;text-align:center}

.container{display:flex;height:calc(100vh - 50px)}
.sidebar{width:260px;padding:10px;border-right:1px solid #444;overflow:auto}
.main{flex:1;padding:10px}

.card{border:1px solid #444;border-radius:8px;padding:10px;margin-bottom:10px}

button{padding:5px 8px;margin:3px;border:none;border-radius:6px;background:#666;color:white;cursor:pointer}
input,select,textarea{width:100%;margin:4px 0;padding:5px;border-radius:5px}

#map{height:400px;border:1px solid #444;position:relative;overflow:hidden}
.node{position:absolute;border-radius:8px;text-align:center;color:white;cursor:grab}

.line{position:absolute;height:3px;transform-origin:left center}
.timeline{display:flex;overflow-x:auto;gap:10px;padding:5px}
.event{min-width:120px;border:1px solid #555;padding:5px;border-radius:6px}
</style>
</head>

<body class="dark">

<header>Character Studio PRO</header>

<div class="container">

<div class="sidebar">

<button onclick="toggleMode()">Dark / Light</button>

<h3>Folder</h3>
<select id="folderSelect" onchange="changeFolder()"></select>
<input id="newFolder" placeholder="New folder">
<button onclick="addFolder()">Add Folder</button>

<h3>Project</h3>
<select id="projectSelect" onchange="changeProject()"></select>
<input id="newProject" placeholder="New project">
<button onclick="addProject()">Add Project</button>

<h3>Characters</h3>
<div id="charList"></div>

<h3>Timeline</h3>
<input id="time" placeholder="Time">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add</button>

</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc"></textarea>
<input type="color" id="color" value="#6c5ce7">

<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="customTrait()">+ Custom</button>

<div id="traitList"></div>
<button onclick="createCharacter()">Create</button>
</div>

<div class="card">
<h3>Timeline</h3>
<div id="timeline" class="timeline"></div>
</div>

<div class="card">
<h3>Map</h3>
<button onclick="openRelation()">Add Relationship</button>
<div id="map"></div>
</div>

</div>
</div>

<div id="relUI" style="display:none;position:fixed;top:20%;left:30%;background:#222;padding:10px">
<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<input type="color" id="rColor">
<button onclick="makeRel()">Create</button>
</div>

<script>

let TRAITS=[
"Brave","Calm","Angry","Smart","Funny","Loyal","Selfish","Selfless",
"Leader","Follower","Aggressive","Shy","Confident","Lazy","Energetic",
"Creative","Logical","Emotional","Cold","Kind","Jealous","Honest",
"Manipulative","Charming","Strategic","Impulsive","Patient","Reckless"
].sort();

let REL_TYPES=["Friend","Enemy","Sibling","Married","Rival","Mentor"];

let data=JSON.parse(localStorage.getItem("APP"))||{folders:{}};
let currentFolder=null;
let currentProject=null;
let size=70;
let tempTraits=[];

function save(){localStorage.setItem("APP",JSON.stringify(data));render();}

function toggleMode(){
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
}

function addFolder(){
let name=newFolder.value;
if(!name)return;
data.folders[name]={projects:{}};
currentFolder=name;
save();
}

function addProject(){
let name=newProject.value;
if(!name||!currentFolder)return;
data.folders[currentFolder].projects[name]={chars:[],rels:[],timeline:[]};
currentProject=name;
save();
}

function changeFolder(){
currentFolder=folderSelect.value;
currentProject=null;
render();
}

function changeProject(){
currentProject=projectSelect.value;
render();
}

function getProject(){
if(!currentFolder||!currentProject)return null;
return data.folders[currentFolder].projects[currentProject];
}

function addTrait(){
let t=traitSelect.value;
if(!tempTraits.includes(t))tempTraits.push(t);
renderTraits();
}

function customTrait(){
let t=prompt("Trait");
if(t){TRAITS.push(t);TRAITS.sort();render();}
}

function renderTraits(){
traitList.innerHTML=tempTraits.map((t,i)=>`${t} ❌`).join("<br>");
}

function createCharacter(){
let p=getProject(); if(!p)return;
p.chars.push({id:Date.now(),name:name.value,desc:desc.value,color:color.value,traits:[...tempTraits],x:100,y:100});
tempTraits=[];
save();
}

function deleteChar(id){
let p=getProject();
p.chars=p.chars.filter(c=>c.id!==id);
p.rels=p.rels.filter(r=>r.a!==id&&r.b!==id);
save();
}

function addEvent(){
let p=getProject(); if(!p)return;
p.timeline.push({t:time.value,e:event.value});
save();
}

function deleteEvent(i){
let p=getProject();
p.timeline.splice(i,1);
save();
}

function openRelation(){
let p=getProject(); if(!p)return;
relUI.style.display="block";

rA.innerHTML=p.chars.map(c=>`<option value=${c.id}>${c.name}</option>`);
rB.innerHTML=rA.innerHTML;
rType.innerHTML=REL_TYPES.map(r=>`<option>${r}</option>`);
}

function makeRel(){
let p=getProject();
p.rels.push({a:+rA.value,b:+rB.value,type:rType.value,color:rColor.value});
relUI.style.display="none";
save();
}

function deleteRel(i){
let p=getProject();
p.rels.splice(i,1);
save();
}

function render(){
folderSelect.innerHTML=Object.keys(data.folders).map(f=>`<option>${f}</option>`);
if(currentFolder){
projectSelect.innerHTML=Object.keys(data.folders[currentFolder].projects).map(p=>`<option>${p}</option>`);
}

traitSelect.innerHTML=TRAITS.map(t=>`<option>${t}</option>`);

let p=getProject();
if(!p)return;

charList.innerHTML=p.chars.map(c=>`
<div>${c.name} 
<button onclick="deleteChar(${c.id})">❌</button></div>`).join("");

timeline.innerHTML=p.timeline.map((e,i)=>`
<div class="event">${e.t}<br>${e.e}
<button onclick="deleteEvent(${i})">❌</button></div>`).join("");

renderMap();
}

function renderMap(){
let p=getProject(); if(!p)return;
map.innerHTML="";

// lines
p.rels.forEach((r,i)=>{
let a=p.chars.find(c=>c.id===r.a);
let b=p.chars.find(c=>c.id===r.b);
if(!a||!b)return;

let ax=a.x+size/2, ay=a.y+size/2;
let bx=b.x+size/2, by=b.y+size/2;

let dx=bx-ax, dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

line.onclick=()=>deleteRel(i);

map.appendChild(line);
});

// nodes
p.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.background=c.color;
node.style.width=size+"px";
node.style.height=size+"px";
node.style.lineHeight=size+"px";

node.onmousedown=e=>{
function move(ev){
c.x=ev.pageX-map.offsetLeft-size/2;
c.y=ev.pageY-map.offsetTop-size/2;
renderMap();
}
document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

node.onclick=()=>alert(`${c.name}\n${c.desc}\nTraits: ${c.traits.join(", ")}`);

map.appendChild(node);
});
}

render();

</script>
</body>
</html>
