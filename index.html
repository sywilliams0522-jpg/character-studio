<!DOCTYPE html>
<html>
<head>
<title>Character Studio FINAL (Fixed & Improved)</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f1220;color:white}
header{padding:15px;background:#1b1f3a;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:260px;background:#15182b;padding:10px;overflow:auto}
.main{flex:1;padding:10px;overflow:auto}
.card{background:#1e2240;padding:10px;border-radius:10px;margin-bottom:10px}
button{background:#6c5ce7;color:white;border:none;padding:6px;border-radius:6px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:none}
#map{position:relative;height:450px;background:#111;border-radius:10px;overflow:hidden}
.node{position:absolute;padding:8px 12px;border-radius:10px;background:#6c5ce7;cursor:grab;user-select:none}
.line{position:absolute;height:3px;background:red;transform-origin:left center}
.label{position:absolute;color:white;font-size:12px}
</style>
</head>
<body>
<header>🚀 Character Studio FINAL (Actually Works)</header>
<div class="container">

<div class="sidebar">
<h3>Settings</h3>
<label>Background</label>
<input type="color" id="bg">
<label>Character Size</label>
<input type="range" id="size" min="60" max="160" value="90">
<button onclick="applySettings()">Apply</button>

<h3>Timeline</h3>
<input id="time" placeholder="Time">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add Event</button>
<div id="timeline"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<div id="traitList"></div>
<button onclick="addCharacter()">Create</button>
</div>

<div class="card">
<h3>Characters</h3>
<div id="characters"></div>
</div>

<div class="card">
<h3>Map</h3>
<button onclick="startConnectionMode()">Add Connection Mode</button>
<div id="map"></div>
</div>

</div>
</div>

<script>
const TRAITS=[
"Brave","Smart","Funny","Loyal","Evil","Kind","Cold","Hot-headed","Calm","Leader",
"Shy","Confident","Greedy","Curious","Strategic","Lazy","Aggressive","Caring",
"Jealous","Honest","Manipulative","Creative","Fearless","Sarcastic","Stubborn"
];

let data=JSON.parse(localStorage.getItem("FINAL"))||{
characters:[],timeline:[],connections:[]
};

let settings={size:90,bg:"#0f1220"};
let tempTraits=[];
let connectionMode=false;
let selectedChar=null;

function save(){localStorage.setItem("FINAL",JSON.stringify(data));render();}

function applySettings(){
settings.size=document.getElementById("size").value;
settings.bg=document.getElementById("bg").value;
document.body.style.background=settings.bg;
render();
}

function addTrait(){
const val=document.getElementById("traitSelect").value;
if(val&&!tempTraits.includes(val)){
tempTraits.push(val);
renderTraits();
}
}

function renderTraits(){
const div=document.getElementById("traitList");
div.innerHTML="";
tempTraits.forEach((t,i)=>{
const span=document.createElement("span");
span.innerText=t+" ❌ ";
span.onclick=()=>{tempTraits.splice(i,1);renderTraits();};
div.appendChild(span);
});
}

function addCharacter(){
const name=document.getElementById("name").value;
const desc=document.getElementById("desc").value;
if(!name)return;

data.characters.push({id:Date.now(),name,desc,traits:[...tempTraits],x:100,y:100});

tempTraits=[];
renderTraits();
save();
}

function startConnectionMode(){
connectionMode=true;
selectedChar=null;
alert("Click first character, then second");
}

function addEvent(){
const time=document.getElementById("time").value;
const event=document.getElementById("event").value;
data.timeline.push({time,event});
save();
}

function render(){

// traits
const tSel=document.getElementById("traitSelect");
tSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");

// characters
const cDiv=document.getElementById("characters");
cDiv.innerHTML="";
data.characters.forEach(c=>{
const div=document.createElement("div");
div.innerHTML=`<b>${c.name}</b> (${c.traits.join(", ")})`;
cDiv.appendChild(div);
});

// timeline
const tDiv=document.getElementById("timeline");
tDiv.innerHTML="";
data.timeline.forEach(e=>{
const d=document.createElement("div");
d.innerText=e.time+" - "+e.event;
tDiv.appendChild(d);
});

renderMap();
}

function renderMap(){
const map=document.getElementById("map");
map.innerHTML="";

// connections
 data.connections.forEach(con=>{
 const a=data.characters.find(x=>x.id===con.a);
 const b=data.characters.find(x=>x.id===con.b);
 if(a&&b){
 const dx=b.x-a.x;
 const dy=b.y-a.y;
 const dist=Math.sqrt(dx*dx+dy*dy);
 const angle=Math.atan2(dy,dx)*180/Math.PI;

 const line=document.createElement("div");
 line.className="line";
 line.style.width=dist+"px";
 line.style.left=a.x+"px";
 line.style.top=a.y+"px";
 line.style.transform=`rotate(${angle}deg)`;

 line.onclick=()=>{
 alert(`${a.name}: ${a.desc}\n\n${b.name}: ${b.desc}`);
 };

 const label=document.createElement("div");
 label.className="label";
 label.innerText=con.type;
 label.style.left=(a.x+b.x)/2+"px";
 label.style.top=(a.y+b.y)/2+"px";

 map.appendChild(line);
 map.appendChild(label);
 }
 });

// nodes
 data.characters.forEach(c=>{
 const node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";
 node.style.width=settings.size+"px";

 node.onmousedown=(e)=>{
 const offsetX=e.offsetX;
 const offsetY=e.offsetY;

 function move(ev){
 c.x=ev.pageX-map.offsetLeft-offsetX;
 c.y=ev.pageY-map.offsetTop-offsetY;
 renderMap();
 }

 function up(){
 document.removeEventListener("mousemove",move);
 }

 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",up,{once:true});
 };

 node.onclick=()=>{
 if(connectionMode){
 if(!selectedChar){selectedChar=c;}
 else{
 const type=prompt("Relationship type");
 data.connections.push({a:selectedChar.id,b:c.id,type});
 connectionMode=false;
 selectedChar=null;
 save();
 }
 }
 };

 map.appendChild(node);
 });
}

render();
</script>

</body>
</html>
