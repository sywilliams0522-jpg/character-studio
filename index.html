<!DOCTYPE html>
<html>
<head>
  <title>Character Studio Ultimate</title>
  <style>
    body{margin:0;font-family:Segoe UI;background:#0f1220;color:#fff}
    header{padding:15px 20px;background:#1b1f3a;font-size:20px;font-weight:bold}
    .layout{display:flex;height:calc(100vh - 60px)}

    /* sidebar */
    .sidebar{width:220px;background:#15182b;padding:10px;overflow:auto}
    .sidebar button{width:100%;margin:5px 0}

    /* main */
    .main{flex:1;padding:15px;overflow:auto}

    .card{background:#1e2240;padding:12px;border-radius:12px;margin-bottom:12px}
    input,textarea,select{width:100%;margin:5px 0;padding:8px;border-radius:8px;border:none}
    button{background:#6c5ce7;color:#fff;border:none;padding:8px;border-radius:8px;cursor:pointer}
    button:hover{background:#a29bfe}

    .character{background:#2a2f5a;padding:10px;border-radius:10px;margin-top:8px}
    .tag{display:inline-block;background:#444;margin:2px;padding:3px 6px;border-radius:6px;font-size:12px}
  </style>
</head>
<body>

<header>✨ Character Studio Ultimate</header>

<div class="layout">

<div class="sidebar">
  <h3>Sections</h3>
  <div id="sections"></div>
  <button onclick="addSection()">+ Section</button>
</div>

<div class="main">

<div class="card">
  <h3>Create Character</h3>
  <input id="name" placeholder="Name">
  <textarea id="desc" placeholder="Description"></textarea>

  <input id="traitInput" placeholder="Add trait + press Enter">
  <div id="traitList"></div>

  <button onclick="addCharacter()">Add Character</button>
</div>

<div class="card">
  <h3>Characters</h3>
  <div id="characters"></div>
</div>

<div class="card">
  <h3>Timeline</h3>
  <input id="time" placeholder="Time">
  <input id="event" placeholder="Event">
  <button onclick="addEvent()">Add Event</button>
  <div id="timeline"></div>
</div>

</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("studioPro")) || {
  sections:["Main"],
  currentSection:"Main",
  characters:[],
  timeline:[]
};

let tempTraits = [];

function save(){localStorage.setItem("studioPro",JSON.stringify(data));render();}

// sections
function addSection(){
  const name = prompt("Section name");
  if(!name) return;
  data.sections.push(name);
  data.currentSection=name;
  save();
}

// traits input
const traitInput=document.getElementById("traitInput");
traitInput.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    if(traitInput.value){
      tempTraits.push(traitInput.value);
      traitInput.value="";
      renderTraits();
    }
  }
});

function renderTraits(){
  const div=document.getElementById("traitList");
  div.innerHTML="";
  tempTraits.forEach((t,i)=>{
    const span=document.createElement("span");
    span.className="tag";
    span.innerText=t;
    span.onclick=()=>{tempTraits.splice(i,1);renderTraits();}
    div.appendChild(span);
  });
}

// character
function addCharacter(){
  const name=document.getElementById("name").value;
  const desc=document.getElementById("desc").value;
  if(!name) return;

  data.characters.push({
    id:Date.now(),
    name,desc,
    traits:[...tempTraits],
    section:data.currentSection,
    links:[]
  });

  tempTraits=[];
  save();
}

// linking
function link(a,b){
  const type=prompt("Relationship type");
  a.links.push({target:b.id,type});
  save();
}

// timeline
function addEvent(){
  const time=document.getElementById("time").value;
  const event=document.getElementById("event").value;
  if(!event) return;
  data.timeline.push({time,event});
  save();
}

// render
function render(){

// sections
const sDiv=document.getElementById("sections");
sDiv.innerHTML="";
data.sections.forEach(s=>{
  const btn=document.createElement("button");
  btn.innerText=s;
  btn.onclick=()=>{data.currentSection=s;save();}
  sDiv.appendChild(btn);
});

// characters
const cDiv=document.getElementById("characters");
cDiv.innerHTML="";
data.characters.filter(c=>c.section===data.currentSection).forEach(c=>{
  const div=document.createElement("div");
  div.className="character";

  let traitsHTML=c.traits.map(t=>`<span class='tag'>${t}</span>`).join("");

  div.innerHTML=`<b>${c.name}</b><br>${c.desc}<br>${traitsHTML}`;

  data.characters.forEach(o=>{
    if(o.id!==c.id){
      const btn=document.createElement("button");
      btn.innerText="Link → "+o.name;
      btn.onclick=()=>link(c,o);
      div.appendChild(btn);
    }
  });

  c.links.forEach(l=>{
    const target=data.characters.find(x=>x.id===l.target);
    if(target){
      const p=document.createElement("div");
      p.innerText=l.type+": "+target.name;
      div.appendChild(p);
    }
  });

  cDiv.appendChild(div);
});

// timeline
const tDiv=document.getElementById("timeline");
tDiv.innerHTML="";
data.timeline.forEach(e=>{
  const div=document.createElement("div");
  div.className="character";
  div.innerText=e.time+": "+e.event;
  tDiv.appendChild(div);
});
}

render();
</script>

</body>
</html>
