<!DOCTYPE html>
<html>
<head>
<title>Character Studio</title>

<style>
:root{
--bg:#0d0d0d;
--text:#fff;
--card:#1a1a1a;
}

.light{
--bg:#fff;
--text:#000;
--card:#f0f0f0;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--bg);
color:var(--text);
}

header{
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #444;
}

.container{
display:flex;
height:calc(100vh - 50px);
}

.sidebar{
width:250px;
border-right:1px solid #444;
padding:10px;
overflow:auto;
}

.main{
flex:1;
padding:10px;
overflow:auto;
}

.card{
background:var(--card);
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

button{
padding:6px;
margin-top:5px;
cursor:pointer;
}

#mapWrapper{
height:500px;
overflow:auto;
border:1px solid #444;
}

#map{
width:2000px;
height:1500px;
position:relative;
}

.node{
position:absolute;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
color:white;
z-index:2;
}

.line{
position:absolute;
height:3px;
transform-origin:left center;
z-index:3; /* ABOVE nodes */
}

.label{
position:absolute;
font-size:12px;
z-index:3;
}

.panel{
position:fixed;
top:20%;
right:10px;
width:250px;
background:#222;
padding:10px;
border-radius:10px;
}

.modal{
position:fixed;
top:20%;
left:35%;
background:#222;
padding:15px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
Character Studio
<button onclick="toggleTheme()">🌙 / ☀️</button>
</header>

<div class="container">

<div class="sidebar">
<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<div class="card">
<input id="name" placeholder="Name">
<textarea id="desc"></textarea>
<input type="color" id="color" value="#6c5ce7">
<input type="range" id="size" min="40" max="120" value="70">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="addCustomTrait()">+ Custom</button>

<div id="traits"></div>

<button onclick="createChar()">Create</button>
</div>

<div class="card">
<button onclick="openRel()">Add Relationship</button>
</div>

<div id="mapWrapper">
<div id="map"></div>
</div>

</div>
</div>

<div id="infoPanel" class="panel" style="display:none"></div>

<div id="editModal" class="modal" style="display:none">
<input id="editName">
<textarea id="editDesc"></textarea>
<input type="color" id="editColor">
<input type="range" id="editSize">

<button onclick="saveEdit()">Save</button>
<button onclick="closeEdit()">Cancel</button>
</div>

<div id="relModal" class="modal" style="display:none">
<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<button onclick="addCustomRel()">+ Custom</button>
<input type="color" id="rColor">
<button onclick="createRel()">Create</button>
<button onclick="closeRel()">Cancel</button>
</div>

<script>

let TRAITS=["Brave","Calm","Smart","Funny"];
let REL=["Friend","Enemy"];

let data={chars:[],rels:[]};
let tempTraits=[];
let editId=null;

// THEME
function toggleTheme(){document.body.classList.toggle("light");}

// TRAITS
function addTrait(){
let t=traitSel.value;
if(!tempTraits.includes(t)) tempTraits.push(t);
traits.innerHTML=tempTraits.join(", ");
}

function addCustomTrait(){
let t=prompt("New trait");
if(!t)return;
TRAITS.push(t);
TRAITS=[...new Set(TRAITS)].sort();
render();
}

// CREATE
function createChar(){
if(!name.value.trim())return;

data.chars.push({
id:Date.now(),
name:name.value,
desc:desc.value,
color:color.value,
size:+size.value,
traits:[...tempTraits],
x:200,y:200
});

name.value="";
desc.value="";
tempTraits=[];
render();
}

// INFO PANEL
function showInfo(c){
infoPanel.style.display="block";
infoPanel.innerHTML=`
<h3>${c.name}</h3>
<p>${c.desc}</p>
<p>${c.traits.join(", ")}</p>
<button onclick="openEdit(${c.id})">Edit</button>
`;
}

// EDIT
function openEdit(id){
let c=data.chars.find(x=>x.id===id);
editId=id;

editName.value=c.name;
editDesc.value=c.desc;
editColor.value=c.color;
editSize.value=c.size;

editModal.style.display="block";
}

function saveEdit(){
let c=data.chars.find(x=>x.id===editId);

c.name=editName.value;
c.desc=editDesc.value;
c.color=editColor.value;
c.size=+editSize.value;

closeEdit();
render();
}

function closeEdit(){
editModal.style.display="none";
}

// REL
function openRel(){
relModal.style.display="block";

let opts=data.chars.map(c=>`<option value=${c.id}>${c.name}</option>`).join("");

rA.innerHTML=opts;
rB.innerHTML=opts;
rType.innerHTML=REL.map(r=>`<option>${r}</option>`).join("");
}

function closeRel(){relModal.style.display="none";}

function addCustomRel(){
let r=prompt("New relation");
if(!r)return;
REL.push(r);
REL=[...new Set(REL)];
openRel();
}

function createRel(){
data.rels.push({
a:+rA.value,
b:+rB.value,
type:rType.value,
color:rColor.value
});
closeRel();
render();
}

// RENDER
function render(){

traitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`);

charList.innerHTML=data.chars.map(c=>
`<div>${c.name}</div>`
).join("");

renderMap();
}

// MAP
function renderMap(){
map.innerHTML="";

// LINES FIRST (so they sit above via z-index)
data.rels.forEach((r,i)=>{
let a=data.chars.find(c=>c.id===r.a);
let b=data.chars.find(c=>c.id===r.b);

let ax=a.x+a.size/2;
let ay=a.y+a.size/2;
let bx=b.x+b.size/2;
let by=b.y+b.size/2;

let dx=bx-ax,dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

// DELETE ON CLICK
line.onclick=()=>{
data.rels.splice(i,1);
render();
};

let label=document.createElement("div");
label.className="label";
label.innerText=r.type;
label.style.left=(ax+bx)/2+"px";
label.style.top=(ay+by)/2+"px";

map.appendChild(line);
map.appendChild(label);
});

// NODES
data.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;
node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.width=c.size+"px";
node.style.height=c.size+"px";
node.style.background=c.color;

node.onclick=()=>showInfo(c);

// DRAG
node.onmousedown=e=>{
let ox=e.offsetX, oy=e.offsetY;

function move(ev){
c.x=ev.pageX-map.offsetLeft-ox;
c.y=ev.pageY-map.offsetTop-oy;
renderMap();
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

map.appendChild(node);
});
}

// INIT
render();

</script>
</body>
</html>
