<!DOCTYPE html>
<html>
<head>
<title>Character Studio COMPLETE FIX</title>
<style>
body{margin:0;font-family:Segoe UI}
.dark{background:#000;color:#fff}
.light{background:#fff;color:#000}
header{padding:15px;background:#1b1f3a;color:white;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:260px;background:#15182b;padding:10px;overflow:auto;color:white}
.main{flex:1;padding:10px;overflow:auto}
.card{background:#1e2240;padding:10px;border-radius:10px;margin-bottom:10px;color:white}
button{background:#6c5ce7;color:white;border:none;padding:6px;border-radius:6px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:none}
#map{position:relative;height:500px;background:#111;border-radius:10px;overflow:hidden}
.node{position:absolute;border-radius:10px;cursor:grab;user-select:none;text-align:center;color:white}
.line{position:absolute;height:3px;transform-origin:left center}
</style>
</head>
<body class="dark">
<header>🚀 Character Studio COMPLETE</header>
<div class="container">

<div class="sidebar">
<button onclick="toggleMode()">Toggle Dark/Light</button>

<h3>Character Size</h3>
<input type="range" id="size" min="20" max="150" value="70" oninput="applySize()">

<h3>Timeline</h3>
<input id="time" placeholder="Time">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add</button>
<div id="timeline"></div>

<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">

<select id="traitSelect"></select>
<button onclick="addTrait()">Add Trait</button>
<button onclick="customTrait()">Custom Trait</button>
<div id="traitList"></div>

<button onclick="addCharacter()">Create</button>
</div>

<div class="card">
<h3>Map</h3>
<button onclick="openRelationUI()">Add Relationship</button>
<div id="map"></div>
</div>

</div>
</div>

<div id="relationUI" style="display:none;position:fixed;top:20%;left:30%;background:#222;padding:15px;border-radius:10px">
<h3>Relationship</h3>
<select id="charA"></select>
<select id="charB"></select>
<select id="relType"></select>
<input type="color" id="relColor" value="#ff0000">
<button onclick="createRelation()">Create</button>
<button onclick="closeRelationUI()">Cancel</button>
</div>

<script>
let TRAITS=["Brave","Smart","Funny","Loyal","Evil","Kind","Calm","Aggressive","Leader","Shy","Confident","Lazy","Creative","Curious","Honest","Jealous","Cold","Caring"].sort();
let REL_TYPES=["Friend","Enemy","Sibling","Married","Parent","Child","Rival","Mentor"];

let data=JSON.parse(localStorage.getItem("FINALAPP"))||{
characters:[],connections:[],timeline:[]
};

let size=70;
let tempTraits=[];

function save(){localStorage.setItem("FINALAPP",JSON.stringify(data));render();}

function toggleMode(){document.body.classList.toggle("dark");document.body.classList.toggle("light");}

function applySize(){size=parseInt(document.getElementById("size").value);render();}

function addTrait(){
let t=document.getElementById("traitSelect").value;
if(!tempTraits.includes(t))tempTraits.push(t);
renderTraits();
}

function customTrait(){
let t=prompt("Trait");
if(t){TRAITS.push(t);TRAITS.sort();render();}
}

function renderTraits(){
let div=document.getElementById("traitList");
div.innerHTML=tempTraits.join(", ");
}

function addCharacter(){
let name=document.getElementById("name").value;
let desc=document.getElementById("desc").value;
let color=document.getElementById("color").value;
if(!name)return;

data.characters.push({id:Date.now(),name,desc,color,traits:[...tempTraits],x:100,y:100});

tempTraits=[];
renderTraits();
save();
}

function addEvent(){
let t=document.getElementById("time").value;
let e=document.getElementById("event").value;
data.timeline.push({t,e});
save();
}

function openRelationUI(){
let ui=document.getElementById("relationUI");
ui.style.display="block";

let a=document.getElementById("charA");
let b=document.getElementById("charB");
a.innerHTML=b.innerHTML="";

data.characters.forEach(c=>{
let o=document.createElement("option");o.value=c.id;o.text=c.name;a.appendChild(o);
let o2=document.createElement("option");o2.value=c.id;o2.text=c.name;b.appendChild(o2);
});

document.getElementById("relType").innerHTML=REL_TYPES.map(r=>`<option>${r}</option>`);
}

function closeRelationUI(){document.getElementById("relationUI").style.display="none";}

function createRelation(){
let a=parseInt(charA.value);
let b=parseInt(charB.value);
let type=relType.value;
let color=relColor.value;
data.connections.push({a,b,type,color});
closeRelationUI();
save();
}

function render(){

// traits dropdown
traitSelect.innerHTML=TRAITS.map(t=>`<option>${t}</option>`);

// timeline
let tDiv=document.getElementById("timeline");
tDiv.innerHTML="";
data.timeline.forEach(e=>{
let d=document.createElement("div");d.innerText=e.t+" - "+e.e;tDiv.appendChild(d);
});

// list
let list=document.getElementById("charList");
list.innerHTML="";
data.characters.forEach(c=>{
let d=document.createElement("div");d.innerText=c.name;list.appendChild(d);
});

renderMap();
}

function renderMap(){
let map=document.getElementById("map");
map.innerHTML="";

// lines
 data.connections.forEach(con=>{
 let a=data.characters.find(x=>x.id===con.a);
 let b=data.characters.find(x=>x.id===con.b);
 if(!a||!b)return;

 let ax=a.x+size/2;
 let ay=a.y+size/2;
 let bx=b.x+size/2;
 let by=b.y+size/2;

 let dx=bx-ax, dy=by-ay;
 let dist=Math.sqrt(dx*dx+dy*dy);
 let angle=Math.atan2(dy,dx)*180/Math.PI;

 let line=document.createElement("div");
 line.className="line";
 line.style.background=con.color;
 line.style.width=dist+"px";
 line.style.left=ax+"px";
 line.style.top=ay+"px";
 line.style.transform=`rotate(${angle}deg)`;

 map.appendChild(line);
 });

// nodes
 data.characters.forEach(c=>{
 let node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";
 node.style.background=c.color;
 node.style.width=size+"px";
 node.style.height=size+"px";
 node.style.lineHeight=size+"px";

 node.onmousedown=(e)=>{
 function move(ev){
 c.x=ev.pageX-map.offsetLeft-size/2;
 c.y=ev.pageY-map.offsetTop-size/2;
 renderMap();
 }
 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
 };

 node.onclick=()=>alert(`${c.name}\n${c.desc}\nTraits: ${c.traits.join(", ")}`);

 map.appendChild(node);
 });
}

render();
</script>
</body>
</html>
