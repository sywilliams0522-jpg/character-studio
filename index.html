<!DOCTYPE html>
<html>
<head>
<title>Character Studio</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#111;
color:#fff;
}

header{
padding:10px;
border-bottom:1px solid #444;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
display:flex;
height:calc(100vh - 50px);
}

.sidebar{
width:250px;
border-right:1px solid #444;
padding:10px;
overflow:auto;
}

.main{
flex:1;
padding:10px;
overflow:auto;
}

.card{
border:1px solid #444;
padding:10px;
margin-bottom:10px;
border-radius:10px;
}

input,textarea,select{
width:100%;
margin:5px 0;
padding:5px;
}

button{
margin:5px 0;
padding:5px;
cursor:pointer;
}

#mapWrap{
height:500px;
overflow:auto;
border:1px solid #444;
}

#map{
width:3000px;
height:5000px;
position:relative;
background:#1a1a1a;
}

.node{
position:absolute;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
cursor:grab;
color:#fff;
user-select:none;
}

.line{
position:absolute;
height:3px;
transform-origin:left;
z-index:10;
}

.label{
position:absolute;
font-size:12px;
z-index:11;
}

.panel{
position:fixed;
right:10px;
top:80px;
width:260px;
background:#222;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<div>📚 Character Studio</div>
<button onclick="document.body.classList.toggle('light')">🌙 / ☀️</button>
</header>

<div class="container">

<div class="sidebar">
<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<!-- CREATE -->
<div class="card">
<h3>Create Character</h3>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">
<input type="range" id="size" min="40" max="120" value="70">

<select id="traitSel"></select>
<button onclick="addTrait()">Add Trait</button>

<div id="traitList"></div>

<button onclick="createChar()">Create Character</button>
</div>

<!-- TIMELINE -->
<div class="card">
<h3>Timeline</h3>

<input id="year" placeholder="Year">
<input id="event" placeholder="Event">
<button onclick="addEvent()">Add</button>

<div id="timeline"></div>
</div>

<!-- REL -->
<div class="card">
<button onclick="openRel()">Add Relationship</button>
</div>

<div id="mapWrap">
<div id="map"></div>
</div>

</div>
</div>

<!-- INFO -->
<div id="info" class="panel" style="display:none"></div>

<!-- EDIT -->
<div id="edit" class="panel" style="display:none">
<h3>Edit Character</h3>

<input id="eName">
<textarea id="eDesc"></textarea>
<input type="color" id="eColor">
<input type="range" id="eSize">

<button onclick="saveEdit()">Save</button>
</div>

<!-- REL -->
<div id="rel" class="panel" style="display:none">
<h3>Relationship</h3>

<select id="rA"></select>
<select id="rB"></select>
<select id="rType"></select>
<input type="color" id="rColor">

<button onclick="createRel()">Create</button>
<button onclick="closeRel()">Cancel</button>
</div>

<script>

let TRAITS=["Brave","Calm","Smart","Funny"];
let tempTraits=[];

let data={
chars:[],
rels:[],
timeline:[]
};

let editId=null;

// TRAITS
function addTrait(){
let t=traitSel.value;
if(!tempTraits.includes(t)) tempTraits.push(t);
renderTraits();
}

function renderTraits(){
traitList.innerHTML=tempTraits.map((t,i)=>
`${t} <button onclick="tempTraits.splice(${i},1);renderTraits()">❌</button>`
).join("<br>");
}

// 🚨 FIXED CHARACTER CREATION (THIS WAS YOUR BUG)
function createChar(){

const n = document.getElementById("name").value.trim();
const d = document.getElementById("desc").value;
const c = document.getElementById("color").value;
const s = parseInt(document.getElementById("size").value);

if(!n){
alert("Enter a character name");
return;
}

data.chars.push({
id:Date.now(),
name:n,
desc:d,
color:c,
size:s,
traits:[...tempTraits],
x:200,
y:200
});

// reset
document.getElementById("name").value="";
document.getElementById("desc").value="";
tempTraits=[];
renderTraits();

render();
}

// TIMELINE
function addEvent(){
let y=document.getElementById("year").value;
let e=document.getElementById("event").value;

if(!e)return;

data.timeline.push({
year:+y||0,
text:e
});

render();
}

// REL
function openRel(){
rel.style.display="block";

let opts=data.chars.map(c=>`<option value=${c.id}>${c.name}</option>`).join("");

rA.innerHTML=opts;
rB.innerHTML=opts;
rType.innerHTML=`<option>Friend</option><option>Enemy</option><option>Sibling</option>`;
}

function closeRel(){rel.style.display="none";}

function createRel(){
data.rels.push({
a:+rA.value,
b:+rB.value,
type:rType.value,
color:rColor.value
});

closeRel();
render();
}

// RENDER
function render(){

traitSel.innerHTML=TRAITS.map(t=>`<option>${t}</option>`).join("");

charList.innerHTML=data.chars.map(c=>
`<div onclick="showInfo(${c.id})">${c.name}</div>`
).join("");

timeline.innerHTML=data.timeline
.sort((a,b)=>a.year-b.year)
.map((e,i)=>
`${e.year} - ${e.text} <button onclick="data.timeline.splice(${i},1);render()">❌</button><br>`
).join("");

renderMap();
}

// INFO
function showInfo(id){
let c=data.chars.find(x=>x.id===id);

info.style.display="block";
info.innerHTML=`
<h3>${c.name}</h3>
<p>${c.desc}</p>
<p><b>Traits:</b> ${c.traits.join(", ")}</p>
`;
}

// MAP
function renderMap(){
map.innerHTML="";

// RELS
data.rels.forEach((r,i)=>{
let a=data.chars.find(c=>c.id===r.a);
let b=data.chars.find(c=>c.id===r.b);
if(!a||!b)return;

let ax=a.x+a.size/2;
let ay=a.y+a.size/2;
let bx=b.x+b.size/2;
let by=b.y+b.size/2;

let dx=bx-ax,dy=by-ay;
let dist=Math.sqrt(dx*dx+dy*dy);
let angle=Math.atan2(dy,dx)*180/Math.PI;

let line=document.createElement("div");
line.className="line";
line.style.background=r.color;
line.style.width=dist+"px";
line.style.left=ax+"px";
line.style.top=ay+"px";
line.style.transform=`rotate(${angle}deg)`;

line.onclick=()=>{
data.rels.splice(i,1);
render();
};

map.appendChild(line);
});

// NODES
data.chars.forEach(c=>{
let node=document.createElement("div");
node.className="node";
node.innerText=c.name;

node.style.left=c.x+"px";
node.style.top=c.y+"px";
node.style.width=c.size+"px";
node.style.height=c.size+"px";
node.style.background=c.color;

// drag FIXED
node.onmousedown=e=>{
let ox=e.offsetX,oy=e.offsetY;

function move(ev){
c.x=ev.pageX-map.offsetLeft-ox;
c.y=ev.pageY-map.offsetTop-oy;
renderMap();
}

document.addEventListener("mousemove",move);
document.addEventListener("mouseup",()=>document.removeEventListener("mousemove",move),{once:true});
};

map.appendChild(node);
});
}

// INIT
render();

</script>

</body>
</html>
