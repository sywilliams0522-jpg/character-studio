<!DOCTYPE html>
<html>
<head>
<title>Character Studio RELATION FIX</title>
<style>
body{margin:0;font-family:Segoe UI}
.dark{background:#000;color:#fff}
.light{background:#fff;color:#000}
header{padding:15px;background:#1b1f3a;color:white;font-size:20px}
.container{display:flex;height:calc(100vh - 60px)}
.sidebar{width:260px;background:#15182b;padding:10px;overflow:auto;color:white}
.main{flex:1;padding:10px;overflow:auto}
.card{background:#1e2240;padding:10px;border-radius:10px;margin-bottom:10px;color:white}
button{background:#6c5ce7;color:white;border:none;padding:6px;border-radius:6px;margin:3px;cursor:pointer}
input,textarea,select{width:100%;padding:6px;margin:5px 0;border-radius:6px;border:none}
#map{position:relative;height:500px;background:#111;border-radius:10px;overflow:hidden}
.node{position:absolute;padding:6px;border-radius:10px;cursor:grab;user-select:none;text-align:center}
.line{position:absolute;height:3px;transform-origin:left center}
.label{position:absolute;font-size:12px}
.modal{position:fixed;top:20%;left:35%;background:#222;padding:15px;border-radius:10px;display:none}
</style>
</head>
<body class="dark">
<header>🚀 Character Studio (RELATION FIXED)</header>
<div class="container">

<div class="sidebar">
<button onclick="toggleMode()">Toggle Dark/Light</button>
<h3>Characters</h3>
<div id="charList"></div>
</div>

<div class="main">

<div class="card">
<h3>Create Character</h3>
<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input type="color" id="color" value="#6c5ce7">
<button onclick="addCharacter()">Create</button>
</div>

<div class="card">
<h3>Map</h3>
<button onclick="openRelationUI()">Add Relationship</button>
<div id="map"></div>
</div>

</div>
</div>

<div class="modal" id="relationUI">
<h3>Create Relationship</h3>
<label>Character 1</label>
<select id="charA"></select>
<label>Character 2</label>
<select id="charB"></select>
<label>Type</label>
<select id="relType"></select>
<label>Color</label>
<input type="color" id="relColor" value="#ff0000">
<button onclick="createRelation()">Create</button>
<button onclick="closeRelationUI()">Cancel</button>
</div>

<script>
let REL_TYPES=["Friend","Enemy","Sibling","Brother","Sister","Married","Dating","Parent","Child","Rival","Mentor","Student"];

let data=JSON.parse(localStorage.getItem("REL_FIX"))||{characters:[],connections:[]};
let dragging=false;

function save(){localStorage.setItem("REL_FIX",JSON.stringify(data));render();}

function toggleMode(){
document.body.classList.toggle("dark");
document.body.classList.toggle("light");
}

function addCharacter(){
const name=document.getElementById("name").value;
const desc=document.getElementById("desc").value;
const color=document.getElementById("color").value;
if(!name)return;

data.characters.push({id:Date.now(),name,desc,color,x:100,y:100});
save();
}

function openRelationUI(){
const modal=document.getElementById("relationUI");
modal.style.display="block";

const charA=document.getElementById("charA");
const charB=document.getElementById("charB");
charA.innerHTML="";
charB.innerHTML="";

 data.characters.forEach(c=>{
 let o1=document.createElement("option");
 o1.value=c.id;o1.textContent=c.name;
 charA.appendChild(o1);

 let o2=document.createElement("option");
 o2.value=c.id;o2.textContent=c.name;
 charB.appendChild(o2);
 });

const relType=document.getElementById("relType");
relType.innerHTML=REL_TYPES.map(r=>`<option>${r}</option>`).join("");
}

function closeRelationUI(){document.getElementById("relationUI").style.display="none";}

function createRelation(){
const a=parseInt(document.getElementById("charA").value);
const b=parseInt(document.getElementById("charB").value);
const type=document.getElementById("relType").value;
const color=document.getElementById("relColor").value;

if(a===b)return alert("Pick 2 different characters");

data.connections.push({a,b,type,color});
closeRelationUI();
save();
}

function render(){

// list
const list=document.getElementById("charList");
list.innerHTML="";
data.characters.forEach(c=>{
let d=document.createElement("div");d.innerText=c.name;list.appendChild(d);
});

renderMap();
}

function renderMap(){
const map=document.getElementById("map");
map.innerHTML="";

// lines
 data.connections.forEach(con=>{
 const a=data.characters.find(x=>x.id===con.a);
 const b=data.characters.find(x=>x.id===con.b);
 if(!a||!b)return;

 const ax=a.x+40;
 const ay=a.y+40;
 const bx=b.x+40;
 const by=b.y+40;

 const dx=bx-ax;
 const dy=by-ay;
 const dist=Math.sqrt(dx*dx+dy*dy);
 const angle=Math.atan2(dy,dx)*180/Math.PI;

 const line=document.createElement("div");
 line.className="line";
 line.style.background=con.color;
 line.style.width=dist+"px";
 line.style.left=ax+"px";
 line.style.top=ay+"px";
 line.style.transform=`rotate(${angle}deg)`;

 const label=document.createElement("div");
 label.className="label";
 label.innerText=con.type;
 label.style.left=(ax+bx)/2+"px";
 label.style.top=(ay+by)/2+"px";

 map.appendChild(line);
 map.appendChild(label);
 });

// nodes
 data.characters.forEach(c=>{
 const node=document.createElement("div");
 node.className="node";
 node.innerText=c.name;
 node.style.left=c.x+"px";
 node.style.top=c.y+"px";
 node.style.background=c.color;
 node.style.width="80px";
 node.style.height="80px";
 node.style.lineHeight="80px";

 node.onmousedown=(e)=>{
 dragging=true;

 function move(ev){
 c.x=ev.pageX-map.offsetLeft-40;
 c.y=ev.pageY-map.offsetTop-40;
 renderMap();
 }

 function up(){dragging=false;document.removeEventListener("mousemove",move);} 

 document.addEventListener("mousemove",move);
 document.addEventListener("mouseup",up,{once:true});
 };

 node.onclick=()=>{
 if(dragging)return;
 alert(`${c.name}\n\n${c.desc}`);
 };

 map.appendChild(node);
 });
}

render();
</script>
</body>
</html>
